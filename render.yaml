databases:
  - name: obdigital-db
    plan: free
    databaseName: obdigital
    user: obdigital

services:
  - type: web
    name: obdigital
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: obdigital-db
          property: connectionString
