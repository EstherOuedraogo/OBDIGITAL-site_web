services:
  - type: web
    name: obdigital
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_KEY
        sync: false
      - key: NODE_ENV
        value: production
    disk:
      name: obdigital-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
